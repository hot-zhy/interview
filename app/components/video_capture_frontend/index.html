<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; font-family: sans-serif; }
  video { width: 100%; border-radius: 8px; background: #111; }
  .status { font-size: 11px; color: #888; text-align: center; margin-top: 4px; }
  .err { color: #e55; }
</style>
</head>
<body>
  <video id="vid" autoplay playsinline muted></video>
  <div class="status" id="status">正在连接摄像头…</div>
  <canvas id="cvs" style="display:none"></canvas>

  <script>
    // Streamlit custom component protocol (no external lib needed)
    function sendMsg(type, data) {
      window.parent.postMessage({isStreamlitMessage: true, type: type, ...data}, "*");
    }
    function setComponentValue(v) { sendMsg("streamlit:setComponentValue", {value: v}); }
    function setFrameHeight(h)    { sendMsg("streamlit:setFrameHeight", {height: h}); }

    // Tell Streamlit we're ready
    sendMsg("streamlit:componentReady", {apiVersion: 1});

    const video  = document.getElementById('vid');
    const canvas = document.getElementById('cvs');
    const status = document.getElementById('status');
    const ctx    = canvas.getContext('2d');
    let intervalMs = 5000;
    let frameCount = 0;
    let captureTimer = null;

    // Listen for render events (receive args from Python)
    window.addEventListener("message", (e) => {
      if (e.data && e.data.type === "streamlit:render") {
        const args = e.data.args || {};
        if (args.interval_ms) intervalMs = args.interval_ms;
        setFrameHeight(document.body.scrollHeight);
      }
    });

    // Open webcam
    navigator.mediaDevices.getUserMedia({video: {width: 320, height: 240, facingMode: "user"}, audio: false})
      .then(stream => {
        video.srcObject = stream;
        status.textContent = '摄像头已连接 · 后台自动采集中';

        // Periodic frame capture
        captureTimer = setInterval(() => {
          if (video.readyState >= 2 && video.videoWidth > 0) {
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
            frameCount++;
            setComponentValue(b64);
            status.textContent = '摄像头已连接 · 已采集 ' + frameCount + ' 帧';
          }
        }, intervalMs);
      })
      .catch(err => {
        status.textContent = '无法访问摄像头: ' + err.message;
        status.classList.add('err');
      });

    setTimeout(() => setFrameHeight(document.body.scrollHeight), 200);
  </script>
</body>
</html>
