<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <linearGradient id="prob" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e0e0"/>
      <stop offset="100%" style="stop-color:#e8d5d5"/>
    </linearGradient>
    <linearGradient id="sol" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f0f0"/>
      <stop offset="100%" style="stop-color:#d5e8e8"/>
    </linearGradient>
    <linearGradient id="res" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f5e0"/>
      <stop offset="100%" style="stop-color:#d5e8d5"/>
    </linearGradient>
  </defs>
  <!-- Section headers -->
  <text x="130" y="30" font-size="14" font-weight="bold" fill="#333">Problems</text>
  <text x="430" y="30" font-size="14" font-weight="bold" fill="#333">Our Solutions (Modules)</text>
  <text x="730" y="30" font-size="14" font-weight="bold" fill="#333">Results</text>
  <!-- Problems -->
  <rect x="20" y="50" width="220" height="55" rx="6" fill="url(#prob)" stroke="#b88" stroke-width="1"/>
  <text x="130" y="80" font-size="11" fill="#333" text-anchor="middle">P1: Inconsistent Difficulty Calibration</text>
  <rect x="20" y="120" width="220" height="55" rx="6" fill="url(#prob)" stroke="#b88" stroke-width="1"/>
  <text x="130" y="150" font-size="11" fill="#333" text-anchor="middle">P2: Ineffective Question Selection</text>
  <rect x="20" y="190" width="220" height="55" rx="6" fill="url(#prob)" stroke="#b88" stroke-width="1"/>
  <text x="130" y="220" font-size="11" fill="#333" text-anchor="middle">P3: ReliabilityNuance Trade-off</text>
  <!-- Solutions -->
  <rect x="280" y="45" width="180" height="75" rx="6" fill="url(#sol)" stroke="#6aa" stroke-width="1"/>
  <text x="370" y="70" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">RQ1: Adaptive Interview Engine</text>
  <text x="370" y="90" font-size="9" fill="#444" text-anchor="middle">Sliding-window · Target-score</text>
  <text x="370" y="105" font-size="9" fill="#444" text-anchor="middle">Adaptive termination</text>
  <rect x="280" y="135" width="180" height="75" rx="6" fill="url(#sol)" stroke="#6aa" stroke-width="1"/>
  <text x="370" y="160" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">RQ2: Question Selector</text>
  <text x="370" y="180" font-size="9" fill="#444" text-anchor="middle">Multi-priority P1/P2/P3</text>
  <text x="370" y="195" font-size="9" fill="#444" text-anchor="middle">IRT+Fisher+UCB · Resume</text>
  <rect x="280" y="225" width="180" height="75" rx="6" fill="url(#sol)" stroke="#6aa" stroke-width="1"/>
  <text x="370" y="250" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">RQ3: Evaluation Engine</text>
  <text x="370" y="270" font-size="9" fill="#444" text-anchor="middle">5-dim rule-based · LLM</text>
  <text x="370" y="285" font-size="9" fill="#444" text-anchor="middle">Automatic fallback</text>
  <!-- Supporting modules -->
  <rect x="480" y="160" width="140" height="50" rx="4" fill="#f5f5d5" stroke="#999" stroke-width="1"/>
  <text x="550" y="185" font-size="9" fill="#444" text-anchor="middle">Resume Parser · Speech</text>
  <text x="550" y="200" font-size="9" fill="#444" text-anchor="middle">Follow-up · Report</text>
  <!-- Results -->
  <rect x="680" y="50" width="180" height="60" rx="6" fill="url(#res)" stroke="#6a6" stroke-width="1"/>
  <text x="770" y="80" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">87.3% Calibration</text>
  <text x="770" y="98" font-size="9" fill="#444" text-anchor="middle">4.2 Q Convergence</text>
  <rect x="680" y="125" width="180" height="60" rx="6" fill="url(#res)" stroke="#6a6" stroke-width="1"/>
  <text x="770" y="155" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">73.8% Gap · 85.2% Coverage</text>
  <text x="770" y="173" font-size="9" fill="#444" text-anchor="middle">68.4% Personalization</text>
  <rect x="680" y="200" width="180" height="60" rx="6" fill="url(#res)" stroke="#6a6" stroke-width="1"/>
  <text x="770" y="230" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">84.7% Human Agreement</text>
  <text x="770" y="248" font-size="9" fill="#444" text-anchor="middle">99.2% Uptime</text>
  <!-- Arrows -->
  <line x1="240" y1="77" x2="278" y2="82" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="147" x2="278" y2="172" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="217" x2="278" y2="262" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="82" x2="678" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="172" x2="678" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="262" x2="678" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="160" x2="460" y2="172" stroke="#888" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow)"/>
</svg>
