version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: interview_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-interview123}
      MYSQL_DATABASE: interview_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    container_name: interview_app
    ports:
      - "${APP_PORT:-8501}:8501"
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  mysql_data:
  app_data:
